name: Deploy Baby Nutrition to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'baby-nutrition/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: baby-nutrition/package.json

      - name: Install dependencies
        working-directory: baby-nutrition
        run: npm install

      - name: Build
        working-directory: baby-nutrition
        env:
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
          VITE_APP_PIN: ${{ secrets.VITE_APP_PIN }}
          VITE_API_SECRET: ${{ secrets.VITE_API_SECRET }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: baby-nutrition/dist
          publish_branch: gh-pages
